<div class="row">
    <div class="col-12">
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="/">Home</a></li>
                <li class="breadcrumb-item"><a href="/posts">Posts</a></li>
                <li class="breadcrumb-item active">{{post.title}}</li>
            </ol>
        </nav>
    </div>
</div>

<div class="row">
    <div class="col-lg-8">
        <article class="card">
            <div class="card-body">
                <h1 class="display-6 mb-3">{{post.title}}</h1>
                
                <div class="text-muted mb-4">
                    <small>
                        Posted on {{post.created_at}}
                        {{#currentUser}}
                        <span class="mx-2">|</span>
                        <a href="/posts/{{post.id}}/update" class="text-decoration-none">Edit</a>
                        <span class="mx-2">|</span>
                        <form action="/posts/{{post.id}}" method="POST" style="display: inline;" 
                              onsubmit="return confirm('Are you sure you want to delete this post?');">
                            <input type="hidden" name="_method" value="DELETE">
                            <button type="submit" class="btn btn-link text-danger p-0">Delete</button>
                        </form>
                        {{/currentUser}}
                    </small>
                </div>
                
                <hr>
                
                <div class="post-content">
                    {{post.content}}
                </div>
            </div>
        </article>
        
        <div class="mt-4">
            <a href="/posts" class="btn btn-outline-primary">
                ← Back to Posts
            </a>
        </div>
    </div>
    
    <div class="col-lg-4">
        <div class="card bg-light">
            <div class="card-body">
                <h5 class="card-title">Share</h5>
                <div class="d-grid gap-2">
                    <button class="btn btn-outline-primary btn-sm">Share on Twitter</button>
                    <button class="btn btn-outline-primary btn-sm">Share on Facebook</button>
                    <button class="btn btn-outline-primary btn-sm">Copy Link</button>
                </div>
            </div>
        </div>
    </div>
</div>
