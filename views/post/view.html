<div class="row">
    <div class="col-12">
        <nav aria-label="breadcrumb" class="mb-3">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="/" class="text-decoration-none">Home</a></li>
                <li class="breadcrumb-item"><a href="/posts" class="text-decoration-none">Posts</a></li>
                <li class="breadcrumb-item active text-truncate">{{post.title}}</li>
            </ol>
        </nav>
    </div>
</div>

<div class="row">
    <div class="col-12">
        <article class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <h1 class="display-6 mb-3">{{post.title}}</h1>
                
                <div class="text-muted mb-4">
                    <small class="d-flex align-items-center">
                        <i class="bi bi-calendar3 me-2"></i>
                        <span>{{post.created_at}}</span>
                        {{#currentUser}}
                        <span class="mx-2">|</span>
                        <a href="/posts/{{post.id}}/update" class="text-decoration-none d-flex align-items-center">
                            <i class="bi bi-pencil me-1"></i>Edit
                        </a>
                        <span class="mx-2">|</span>
                        <form action="/posts/{{post.id}}" method="POST" style="display: inline;" 
                              onsubmit="return confirm('Are you sure you want to delete this post?');">
                            <input type="hidden" name="_method" value="DELETE">
                            <button type="submit" class="btn btn-link text-danger p-0 d-flex align-items-center">
                                <i class="bi bi-trash me-1"></i>Delete
                            </button>
                        </form>
                        {{/currentUser}}
                    </small>
                </div>
                
                <hr class="my-4">
                
                <div class="post-content">
                    {{post.content}}
                </div>
            </div>
        </article>
        
        <div class="mt-4 d-grid gap-2">
            <a href="/posts" class="btn btn-outline-primary touch-target">
                <i class="bi bi-arrow-left me-2"></i>Back to Posts
            </a>
        </div>
    </div>
</div>
