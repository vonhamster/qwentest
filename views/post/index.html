<div class="row">
    <div class="col-12">
        <h1 class="display-6 mb-3">All Posts</h1>
    </div>
</div>

<div class="row">
    {{#posts}}
    <div class="col-12 mb-3">
        <div class="card post-card touch-target">
            <div class="card-body">
                <h3 class="post-title mb-2">
                    <a href="/posts/{{id}}" class="text-decoration-none text-dark stretched-link">{{title}}</a>
                </h3>
                <p class="post-meta mb-2">
                    <i class="bi bi-calendar3 me-1"></i>{{created_at}}
                </p>
                <p class="post-excerpt text-muted">{{content}}</p>
            </div>
            <div class="card-footer bg-transparent border-0 pb-0">
                <a href="/posts/{{id}}" class="btn btn-outline-primary btn-sm touch-target">
                    <i class="bi bi-arrow-right me-1"></i>Read More
                </a>
            </div>
        </div>
    </div>
    {{/posts}}
    
    {{^posts}}
    <div class="col-12">
        <div class="alert alert-info" role="alert">
            <i class="bi bi-info-circle me-2"></i>No posts found. Be the first to create one!
        </div>
    </div>
    {{/posts}}
</div>
