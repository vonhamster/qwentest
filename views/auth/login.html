<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
                <h4 class="mb-0">Login</h4>
            </div>
            <div class="card-body">
                {{#error}}
                <div class="alert alert-danger" role="alert">
                    {{error}}
                </div>
                {{/error}}
                
                <form action="/auth/login" method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" required autofocus>
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">Login</button>
                    </div>
                </form>
                
                <hr>
                
                <div class="text-center">
                    <p class="mb-0">Don't have an account?</p>
                    <a href="/auth/register" class="btn btn-outline-secondary">Register</a>
                </div>
            </div>
        </div>
        
        <div class="card mt-4 bg-light">
            <div class="card-body">
                <h6 class="card-subtitle mb-2 text-muted">Demo Credentials</h6>
                <p class="small mb-0"><strong>Username:</strong> admin</p>
                <p class="small"><strong>Password:</strong> admin123</p>
            </div>
        </div>
    </div>
</div>
